<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 ONE UPLOADER PREMIUM</title>
    
    <style>
        :root {
            --primary-bg: linear-gradient(180deg, #FF9966, #FF5E62);
            --footer-bg: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: #4CAF50; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- 🌧️ Multispeed Rain Background --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .falling-item {
            position: absolute; pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* --- 📱 UI Layout --- */
        .header {
            position: relative; z-index: 10;
            background: var(--primary-bg);
            padding: 20px 10px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header h2 { margin: 0; font-size: 20px; font-weight: 900; }

        .main-content {
            position: relative; z-index: 10;
            flex: 1; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; align-items: center;
            padding-bottom: 50px;
        }

        /* --- 🤖 AI Gemini Box --- */
        .ai-container {
            width: 100%; max-width: 450px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            padding: 20px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-wrapper { display: flex; gap: 10px; margin-bottom: 12px; }
        input[type="text"] {
            flex: 1; padding: 15px; border-radius: 15px; border: none;
            font-size: 16px; background: white; color: #333; outline: none;
        }
        .ai-btn {
            padding: 0 15px; border-radius: 15px; border: none;
            background: #000; color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #333;
        }
        .ai-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }
        
        textarea {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: rgba(255,255,255,0.95); font-size: 14px; resize: none;
            color: #222; margin-bottom: 12px; outline: none;
        }
        .copy-btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: #2ecc71; color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #27ae60;
        }

        /* --- 🔘 8 Fixed 3D Buttons --- */
        .btn-3d {
            width: 100%; max-width: 400px; padding: 18px;
            border-radius: 25px; font-size: 19px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; color: white; border: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            transition: 0.1s; cursor: pointer; text-decoration: none;
        }
        .btn-3d:active { transform: translateY(5px); box-shadow: 0 3px 0 rgba(0,0,0,0.3); }

        .yt { background: #FF0000; }
        .fb { background: #3b5998; }
        .ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366); }
        .tw { background: #1DA1F2; }
        .tk { background: #010101; }
        .gpt { background: #10a37f; }
        .chrome { background: linear-gradient(45deg, #4285F4, #34A853, #FBBC05, #EA4335); }
        .wa { background: #25D366; }

        .footer {
            position: relative; z-index: 10;
            background: var(--footer-bg); padding: 15px;
            text-align: center; font-size: 13px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="header">
        <h2>🚀💎 ONE UPLOADER PREMIUM</h2>
        <p>Total 8 Tools Active 👉 Best for Creators</p>
    </div>

    <div class="main-content">
        <div class="ai-container">
            <div class="search-wrapper">
                <input type="text" id="aiInput" placeholder="वीडियो टॉपिक यहाँ लिखें...">
                <button class="ai-btn" onclick="generateAI()">AI Search</button>
            </div>
            <textarea id="aiOutput" rows="5" placeholder="Gemini AI का परिणाम..." readonly></textarea>
            <button class="copy-btn" onclick="copyResult()">📋 Copy Result</button>
        </div>

        <a href="https://studio.youtube.com" target="_blank" class="btn-3d yt">📺 YouTube Studio</a>
        <a href="https://www.facebook.com/reels/create" target="_blank" class="btn-3d fb">📘 Facebook Reels</a>
        <a href="https://www.instagram.com/reels/create/" target="_blank" class="btn-3d ig">📸 Instagram Reels</a>
        <a href="https://twitter.com/compose/tweet" target="_blank" class="btn-3d tw">🐦 Twitter (X)</a>
        <a href="https://www.tiktok.com/upload" target="_blank" class="btn-3d tk">🎵 TikTok Upload</a>
        <a href="https://chat.openai.com" target="_blank" class="btn-3d gpt">🤖 ChatGPT AI</a>
        <a href="https://www.google.com" target="_blank" class="btn-3d chrome">🌐 Google Search</a>
        <a href="https://web.whatsapp.com" target="_blank" class="btn-3d wa">💬 WhatsApp Web</a>
    </div>

    <div class="footer">
        🔥 ONE UPLOADER 💎 | <span>2026 Version</span>
    </div>

    <script>
        // Rain Animation
        const bg = document.getElementById('bg-canvas');
        const items = ['🌙', '⭐', '❤️', '💎', '✨'];
        function createRain() {
            const div = document.createElement('div');
            div.className = 'falling-item';
            div.innerHTML = items[Math.floor(Math.random() * items.length)];
            const size = Math.random() * (26 - 18) + 18;
            const speed = Math.random() * (6 - 2.5) + 2.5; 
            div.style.left = Math.random() * 100 + 'vw';
            div.style.fontSize = size + 'px';
            div.style.animationDuration = speed + 's';
            bg.appendChild(div);
            setTimeout(() => div.remove(), speed * 1000);
        }
        setInterval(createRain, 350);

        // AI Logic
        const API_KEY = "AIzaSyBTLkHyTKZpBEnZZvgTqAm0kvvmF38kgnE"; 
        async function generateAI() {
            const topic = document.getElementById('aiInput').value;
            const output = document.getElementById('aiOutput');
            if(!topic) { alert("टॉपिक लिखें!"); return; }
            output.value = "AI Search चालू है... 🚀✨";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Topic: ${topic}. Provide viral description and 15 hashtags.` }] }],
                        safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },{ category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },{ category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },{ category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }]
                    })
                });
                const data = await response.json();
                output.value = data.candidates[0].content.parts[0].text;
            } catch (err) {
                output.value = "Error: नेट या की (Key) चेक करें।";
            }
        }
        function copyResult() {
            const text = document.getElementById("aiOutput");
            if(!text.value) return;
            text.select();
            document.execCommand("copy");
            alert("कॉपी हो गया! ✅");
        }
    </script>
</body>
</html>
