<!DOCTYPE html>
<html>
<head>
<title>🚀 ONE CLICK - 4 Platforms Live!</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { 
  font-family: Arial; 
  text-align: center; 
  padding: 40px; 
  background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
  color: white;
}
input { padding: 15px; margin: 10px; border: none; border-radius: 10px; font-size: 18px; width: 80%; }
#magicBtn { 
  padding: 25px 40px; 
  background: #ff4444; 
  color: white; 
  font-size: 24px; 
  font-weight: bold; 
  border: none; 
  border-radius: 20px; 
  cursor: pointer;
  margin: 30px 0;
}
#magicBtn:hover { background: #cc3333; transform: scale(1.05); }
#status { font-size: 20px; margin: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; }
.platform-status { display: none; margin: 10px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; }
</style>
</head>
<body>
<h1>⚡ ONE BUTTON → 4 Platforms Live!</h1>

<input type="file" id="video" accept="video/*">
<input type="text" id="title" placeholder="Video Title (Lamborghini Short 🔥)">

<button id="magicBtn" onclick="oneClickMagic()">🚀 ONE CLICK - सब जगह भेजो!</button>

<div id="status"></div>
<div id="youtube-status" class="platform-status">✅ YouTube Ready</div>
<div id="fb-status" class="platform-status">✅ Facebook Ready</div>
<div id="insta-status" class="platform-status">✅ Instagram Ready</div>
<div id="twitter-status" class="platform-status">✅ Twitter Ready</div>

<script>
function oneClickMagic() {
  const video = document.getElementById('video').files[0];
  const title = document.getElementById('title').value.trim();
  
  if (!video || !title) {
    alert('❌ Video + Title भर!');
    return;
  }
  
  // Magic: Title + Hashtags copy
  const magicText = `${title}

🚀 4 Platforms Live!
#shorts #viral #foryou #trending`;
  navigator.clipboard.writeText(magicText);
  
  // Show all 4 status
  document.getElementById('status').innerHTML = `
    🎉 "${title}" copied! 
    📋 Ctrl+V हर tab में paste करो
    ⏱️ 20 सेकंड में 4 जगह LIVE!
  `;
  
  // Show platform status
  document.querySelectorAll('.platform-status').forEach(el => el.style.display = 'block');
  
  // Auto-open 4 tabs (Modern browsers block popup → manual click better)
  setTimeout(() => {
    window.open('https://studio.youtube.com/channel/UC_l1oBZyJfmI8kH7oQfFbcg/manage/videos?filter=%2Fuploads', '_blank');
    window.open('https://facebook.com', '_blank');
    window.open('https://instagram.com', '_blank');
    window.open('https://twitter.com', '_blank');
  }, 1000);
  
  alert(`🔥 MAGIC! "${title}" ready!

📋 Title copied
👆 4 tabs खुले
🎥 Video drag-drop + Ctrl+V
⚡ 20 sec में सब LIVE!`);
}
</script>
</body>
</html>
